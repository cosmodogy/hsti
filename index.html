<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSTI 东放人格测试</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf5 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .quiz-page {
            display: block;
            padding: 24px;
        }
        .progress-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        .question {
            font-size: 18px;
            color: #222;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option:hover {
            border-color: #667eea;
            background: #f5f6ff;
        }
        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: #fff;
        }
        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .prev-btn, .next-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .prev-btn {
            background: linear-gradient(90deg, #e0e0e0, #c0c0c0);
            color: #333;
        }
        .next-btn {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
        }
        .prev-btn:disabled, .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-page {
            display: none;
        }
        .result-card {
            padding: 16px 20px;
        }
        .character-card {
            border-radius: 16px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 0;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }
        .personality-image {
            width: 100%;
            max-width: 260px;
            aspect-ratio: 1 / 1;
            background: #fff;
            border-radius: 12px;
            object-fit: cover;
        }
        .element-tag {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(255,255,255,0.9);
            padding: 6px 12px;
            border-radius: 16px;
            font-weight: bold;
            font-size: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(100, 100, 100, 0.15);

        }
        .personality-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        .personality-name {
            font-size: 32px;
            font-weight: 800;
            color: #222;
            margin-bottom: 10px;
        }
        .match-info {
            padding: 8px 16px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .hint-text {
            color: #666;
            line-height: 1.5;
            margin-bottom: 0;
            font-size: 14px;
        }
        .interpretation {
            background: #fafafa;
            padding: 16px;
            border-radius: 12px;
            line-height: 1.7;
            color: #333;
            font-size: 14px;
        }
        .interpretation h3 {
            margin-bottom: 8px;
            color: #222;
            font-size: 16px;
        }
        .result-btn-group {
            display: flex;
            gap: 12px;
            padding: 0 20px 20px;
        }
        .restart-btn, .save-btn {
            flex: 1;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .restart-btn {
            background: linear-gradient(90deg, #e0e0e0, #c0c0c0);
            color: #333;
        }
        .save-btn {
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .image-preview {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .preview-container {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .preview-image {
            width: 100%;
            display: block;
        }
        .preview-hint {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .preview-buttons {
            display: flex;
            gap: 12px;
            max-width: 480px;
            width: 100%;
        }
        .preview-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }
        .download-btn {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
        }
        .close-btn {
            background: #e0e0e0;
            color: #333;
        }
        @media print {
            .result-btn-group {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="resultContainer">
        <div class="quiz-page" id="quizPage">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="btn-container">
                <button class="prev-btn" id="prevBtn" disabled>上一题</button>
                <button class="next-btn" id="nextBtn" disabled>下一题</button>
            </div>
        </div>
        <div class="result-page" id="resultPage">
            <div class="result-card">
                <div class="character-card" id="characterCard">
                    <img class="personality-image" id="personalityImage" src="" alt="人格类型图片">
                    <div class="element-tag" id="elementTag"></div>
                </div>
            </div>
            <div class="result-card">
                <div class="personality-title">你的东放人格</div>
                <div class="personality-name" id="personalityName"></div>
                <div class="match-info" id="matchInfo"></div>
                <p class="hint-text" id="hintText">维度匹配较高，当前结果可作为你的第一人格参考。</p>
            </div>
            <div class="result-card">
                <div class="interpretation">
                    <h3>人格解读</h3>
                    <p id="interpretationText"></p>
                </div>
            </div>
            <div class="result-btn-group">
                <button class="restart-btn" id="restartBtn" onclick="restartTest()">重新测试</button>
                <button class="save-btn" id="saveBtn" onclick="generatePreviewImage()">生成保存图片</button>
            </div>
        </div>
    </div>
    <div class="image-preview" id="imagePreview">
        <div class="preview-container">
            <img class="preview-image" id="previewImage" src="" alt="测试结果图片">
        </div>
        <p class="preview-hint">💡 右键点击图片选择"另存为"即可保存到电脑</p>
        <div class="preview-buttons">
            <button class="preview-btn download-btn" id="downloadBtn" onclick="downloadImage()">一键下载</button>
            <button class="preview-btn close-btn" onclick="closePreview()">关闭</button>
        </div>
    </div>

        const personalities = [
            { code: "ETJO", charCode: "LICT", name: "里希特", element: "六本木的议长", color: "#D2B48C", bgGradient: "linear-gradient(135deg, #E6D5B8 0%, #D2B48C 100%)", desc: "你是外向凌厉的理性规划者，天生擅长洞察人心、煽动情绪，总能以冷静的逻辑直击他人软肋，凭借出色的表达力收拢绝对的认同。你像里希特一样，行事目标明确、步步为营，有着极强的规划力与掌控欲，布局自带章法。你深谙操控与博弈的本质，怀揣着深沉的谋略与野心，以理性为刃搭建自己的格局，你擅长利用规则，更擅长跳出规则，靠自己的算计牢牢主导着局面。" },

            { code: "ITPO", charCode: "MRTK", name: "戍孝", element: "三尺冰刀", color: "#6495ED", bgGradient: "linear-gradient(135deg, #94B4F5 0%, #6495ED 100%)", desc: "你是一个极度自律且重情重义的灵魂。你像戍孝一样，内心温柔敏感，极其珍视同伴间的羁绊，尤其是对你认定的“主公”。在日常生活中，你高度自律，相信只有通过不懈的修行才能获得保护他人的力量。你虽然有时显得单纯过了头，但这份纯粹的赤诚之心是公会中最宝贵的财富。" },
            { code: "ITPW", charCode: "EBSU", name: "惠比寿", element: "清廉的垂钓者", color: "#FFB6C1", bgGradient: "linear-gradient(135deg, #FFD1D9 0%, #FFB6C1 100%)", desc: "内向、理性、随性且自由。你像惠比寿一样，习惯独自静观世事流转，以冷静清醒的目光洞悉本质。你与世界的距离若即若离，行事随心自在、不喜刻板规划，只遵从内心的理性判断，不愿被人情或规则束缚脚步，在独属于自己的节奏里悠然前行，在垂下鱼钩的时间里随波逐流，低调疏离却自有通透的处世之道。" },
            { code: "IFJO", charCode: "MRIA", name: "玛丽亚", element: "虔诚的信徒", color: "#2E8B57", bgGradient: "linear-gradient(135deg, #4CAF78 0%, #2E8B57 100%)", desc: "内敛且坚定，你的人生就是一场关于信仰与契约的苦旅。你像玛丽亚一样，在沉默中坚守着虔诚的誓言，生活极度规律且富有仪式感。你心中有着不容动摇的信念与准则，凡事按自己的步调笃定前行，既恪守内心的道义秩序，也以柔软的感性守护着心中的信仰。从不轻易外露情绪，却始终以极致的执着践行承诺，在沉静的坚守中，一步一步走向自己认定的归途。" },
            { code: "IFJW", charCode: "ONWK", name: "鬼若", element: "忠义的狂暴法师", color: "#FF0000", bgGradient: "linear-gradient(135deg, #333333 0%, #000000 100%)", desc: "你是缄默感性、执念深重的孤行者。你像鬼若一样，习惯将情绪与本心深藏，从不向外展露脆弱。你行事目标笃定、准则清晰，心中自有一套不可动摇的行事逻辑，从不会散漫随性、随波逐流；你不屑遵从世俗既定秩序，只追随内心的情感与执念前行，挣脱一切外界规则的捆绑。你以感性为内核锚定自己的方向，在无拘的独行中，守着独属于自己的信念与忠义。" },
            { code: "IFPO", charCode: "JBVA", name: "阎波梵", element: "天祐的宝玉", color: "#D8BFD8", bgGradient: "linear-gradient(135deg, #E8D8E8 0%, #D8BFD8 100%)", desc: "你情感细腻且恪守原则，心性温和却尊崇规则。你像阎波梵一样，习惯以安静内敛的姿态待人，将温柔共情藏于沉稳的外表之下，心中自有清晰的道义准则与行事底线，从不会肆意妄为。你拥有着强大的力量，却始终坚守认可的秩序与约定，做事从容随性、稳妥周全，不愿打破安稳的平衡，也会默默守护身边珍视的人。即便不善热烈表达，也始终以柔软本心坚守底线，在松弛自在的步调里，守护着属于自己的平和与羁绊；或许有人视你为软弱，但也会有人珍惜你的温柔。" },
            { code: "IFPW", charCode: "KNYS", name: "国芳", element: "同人作家", color: "#BA55D3", bgGradient: "linear-gradient(135deg, #D187E8 0%, #BA55D3 100%)", desc: "你沉浸在自我的世界中，随性且自由。你像国芳一样，不需要复杂的社交，也不受规则束缚，只是一心浸在毛茸茸中寻找属于自己的感性共鸣。或许你会因为沉浸在自己的世界中忘记全世界，或许你并不那么擅长复杂的人情世故，但你不迎合世俗的审美，也不在乎别人的评价，因为你清楚地明白自己的内心究竟想要什么，活得简单而纯粹。" }
        ];
        let questions = [];
        let currentQuestionIndex = 0;
        let answers = [];
        let generatedImageUrl = null;
        const optionLabels = ["非常符合", "符合", "一般", "不符合", "非常不符合"];
        const optionValues = [5, 4, 3, 2, 1];
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const saveBtn = document.getElementById("saveBtn");

        // 均衡抽取正负向题目，每个维度2正2负1随机
        function getRandomQuestions() {
            const grouped = {
                E: { pos: fullQuestionBank.filter(q => q.type === "E" && q.isPositive), neg: fullQuestionBank.filter(q => q.type === "E" && !q.isPositive) },
                T: { pos: fullQuestionBank.filter(q => q.type === "T" && q.isPositive), neg: fullQuestionBank.filter(q => q.type === "T" && !q.isPositive) },
                J: { pos: fullQuestionBank.filter(q => q.type === "J" && q.isPositive), neg: fullQuestionBank.filter(q => q.type === "J" && !q.isPositive) },
                O: { pos: fullQuestionBank.filter(q => q.type === "O" && q.isPositive), neg: fullQuestionBank.filter(q => q.type === "O" && !q.isPositive) }
            };

            const pick = (arr, n) => [...arr].sort(() => Math.random() - 0.5).slice(0, n);
            let selected = [];

            Object.values(grouped).forEach(dim => {
                selected.push(...pick(dim.pos, 2));
                selected.push(...pick(dim.neg, 2));
                const remaining = [...dim.pos, ...dim.neg].filter(q => !selected.includes(q));
                if (remaining.length > 0) {
                    selected.push(...pick(remaining, 1));
                }
            });

            return selected.sort(() => Math.random() - 0.5);
        }

        function init() {
            questions = getRandomQuestions();
            currentQuestionIndex = 0;
            answers = [];
            generatedImageUrl = null;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById("questionText").textContent = `Q${currentQuestionIndex + 1}/${questions.length}：${q.text}`;
            document.getElementById("progressFill").style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;

            const container = document.getElementById("optionsContainer");
            container.innerHTML = "";
            optionLabels.forEach((label, i) => {
                const div = document.createElement("div");
                div.className = "option";
                div.textContent = label;
                div.onclick = () => selectOption(i);
                container.appendChild(div);
            });

            const savedAnswer = answers[currentQuestionIndex];
            if (savedAnswer !== undefined) {
                const savedIndex = optionValues.indexOf(savedAnswer);
                const options = document.querySelectorAll(".option");
                options[savedIndex].classList.add("selected");
                options[savedIndex].style.backgroundColor = "#667eea";
                options[savedIndex].style.borderColor = "#667eea";
                options[savedIndex].style.color = "#fff";
                nextBtn.disabled = false;
            } else {
                nextBtn.disabled = true;
            }

            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.textContent = currentQuestionIndex === questions.length - 1 ? "提交" : "下一题";
        }

        function selectOption(index) {
            const options = document.querySelectorAll(".option");
            options.forEach(opt => {
                opt.classList.remove("selected");
                opt.style.backgroundColor = "";
                opt.style.borderColor = "#e0e0e0";
                opt.style.color = "";
            });

            const sel = options[index];
            sel.classList.add("selected");
            sel.style.backgroundColor = "#667eea";
            sel.style.borderColor = "#667eea";
            sel.style.color = "#fff";
            answers[currentQuestionIndex] = optionValues[index];
            nextBtn.disabled = false;

            // 自动跳题功能
            if (answers[currentQuestionIndex] !== undefined && currentQuestionIndex === answers.filter(x=>x!==undefined).length-1) {
                setTimeout(() => {
                    if (currentQuestionIndex < questions.length - 1) {
                        currentQuestionIndex++;
                        showQuestion();
                    } else {
                        showResult();
                    }
                }, 30);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        function renderResult(personality, matchRate, hitNum) {
            document.getElementById("quizPage").style.display = "none";
            document.getElementById("resultPage").style.display = "block";
            document.getElementById("characterCard").style.background = personality.bgGradient;

            const imgEl = document.getElementById("personalityImage");
            if (personality.charCode === "????") {
                imgEl.style.display = "none";
            } else {
                imgEl.style.display = "block";
                imgEl.src = `images/${personality.charCode}.png`;
            }

            document.getElementById("elementTag").textContent = personality.element;
            document.getElementById("elementTag").style.color = personality.color;
            document.getElementById("personalityName").textContent = `${personality.charCode}（${personality.name}型）`;
            document.getElementById("matchInfo").textContent = `匹配度 ${matchRate}% · 命中 ${hitNum}/4 维`;
            document.getElementById("matchInfo").style.backgroundColor = `${personality.color}20`;
            document.getElementById("matchInfo").style.color = personality.color;
            document.getElementById("interpretationText").textContent = personality.desc;
            document.getElementById("restartBtn").style.background = "linear-gradient(90deg, #e0e0e0, #c0c0c0)";
            document.getElementById("saveBtn").style.background = personality.bgGradient;

            const hintText = document.getElementById("hintText");
            if (matchRate >= 90) {
                hintText.textContent = "完美匹配！这就是你的本命东放人格。";
            } else if (matchRate >= 75) {
                hintText.textContent = "维度匹配较高。";
            } else if (matchRate >= 60) {
                hintText.textContent = "有一定匹配度。";
            } else {
                hintText.textContent = "匹配度一般。";
            }
        }

        // 
        function showResult() {
            // 
            const isAllNeutral = answers.every(val => val === 3);
            if (isAllNeutral) {
                const egg = {
                    charCode: "????",
                    name: "召唤师",
                    element: "新来的转校生",
                    color: "#FFFFFF",
                    bgGradient: "linear-gradient(135deg, #EEEEEE 0%, #EEEEEE 100%)",
                    desc: "今日方知我是我。"
                };
                renderResult(egg, 100, 4);
                return;
            }

            const dim = { E: 0, T: 0, J: 0, O: 0 };
            const count = { E: 0, T: 0, J: 0, O: 0 };

            questions.forEach((q, i) => {
                let v = answers[i];
                if (!q.isPositive) v = 6 - v;
                dim[q.type] += v;
                count[q.type]++;
            });

            // 计算每个维度的得分率(0-1)
            const eScore = dim.E / (count.E * 5);
            const tScore = dim.T / (count.T * 5);
            const jScore = dim.J / (count.J * 5);
            const oScore = dim.O / (count.O * 5);

            // 
            const eType = eScore >= 0.5 ? "E" : "I";
            const tType = tScore >= 0.5 ? "T" : "F";
            const jType = jScore >= 0.5 ? "J" : "P";
            const oType = oScore >= 0.5 ? "O" : "W";
            const userCode = eType + tType + jType + oType;

            // 直接根据维度组合找到对应人格
            const personality = personalities.find(p => p.code === userCode);

            // 计算匹配度和命中数
            const eDiff = Math.abs(eScore - (eType === "E" ? 1 : 0));
            const tDiff = Math.abs(tScore - (tType === "T" ? 1 : 0));
            const jDiff = Math.abs(jScore - (jType === "J" ? 1 : 0));
            const oDiff = Math.abs(oScore - (oType === "O" ? 1 : 0));
            const totalDiff = eDiff + tDiff + jDiff + oDiff;
            const matchRate = Math.round(100 - (totalDiff / 4 * 100));
            const hitCount = [eDiff, tDiff, jDiff, oDiff].filter(d => d < 0.5).length;

            renderResult(personality, matchRate, hitCount);
        }

        async function generatePreviewImage() {
            saveBtn.disabled = true;
            saveBtn.textContent = "正在生成图片...";

            try {
                const container = document.getElementById("resultContainer");
                const btnGroup = document.querySelector(".result-btn-group");
                btnGroup.style.display = "none";

                const img = document.getElementById("personalityImage");
                if (img.style.display !== "none" && !img.complete) {
                    await new Promise(resolve => {
                        img.onload = resolve;
                        img.onerror = resolve;
                    });
                }

                const canvas = await html2canvas(container, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: "#ffffff",
                    logging: false,
                    allowTaint: true
                });

                btnGroup.style.display = "flex";
                generatedImageUrl = canvas.toDataURL("image/png");
                generatedImageUrl = canvas.toDataURL("image/webp");

                document.getElementById("previewImage").src = generatedImageUrl;
                document.getElementById("imagePreview").style.display = "flex";

                saveBtn.textContent = "生成保存图片";
                saveBtn.disabled = false;
            } catch (error) {
                console.error("生成图片失败:", error);
                saveBtn.textContent = "生成失败，请重试";
                setTimeout(() => {
                    saveBtn.textContent = "生成保存图片";
                    saveBtn.disabled = false;
                }, 2000);
                const btnGroup = document.querySelector(".result-btn-group");
                if (btnGroup) btnGroup.style.display = "flex";
            }
        }

        function downloadImage() {
            if (!generatedImageUrl) return;

            const link = document.createElement("a");
            link.download = `HSTI东放人格测试_${document.getElementById("personalityName").textContent}.png`;
            link.href = generatedImageUrl;
            link.click();
        }

        function closePreview() {
            document.getElementById("imagePreview").style.display = "none";
        }

        function restartTest() {
            closePreview();
            init();
            document.getElementById("quizPage").style.display = "block";
            document.getElementById("resultPage").style.display = "none";
        }

        nextBtn.onclick = () => {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else showResult();
        };
        prevBtn.onclick = prevQuestion;

        document.getElementById("imagePreview").addEventListener("click", function(e) {
            if (e.target === this) {
                closePreview();
            }
        });

        init();
    </script>
